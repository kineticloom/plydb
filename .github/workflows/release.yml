name: Create Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-22.04-arm
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            runner: windows-latest
          # windows/arm64 omitted: not yet supported by duckdb-go-bindings

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install make (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: choco install make -y

      - name: Build and package release binary
        shell: bash
        run: make package-release VERSION=${{ github.ref_name }} COMMIT=${{ github.sha }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: assets-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/plydb_*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/assets
          merge-multiple: true

      - name: Package skill
        run: |
          make build-skill
          cp dist/plydb_skill.zip dist/assets/plydb_skill.zip

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/assets/*
        env:
          GH_TOKEN: ${{ github.token }}
