name: Create Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            runner: windows-latest
          # windows/arm64 omitted: not yet supported by duckdb-go-bindings

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          LDFLAGS="-X github.com/kineticloom/plydb/cmd.Version=${{ github.ref_name }} -X github.com/kineticloom/plydb/cmd.Commit=${{ github.sha }} -X github.com/kineticloom/plydb/cmd.BuildDate=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -ldflags "$LDFLAGS" -o dist/plydb_${{ matrix.goos }}_${{ matrix.goarch }}.exe .
          else
            go build -ldflags "$LDFLAGS" -o dist/plydb_${{ matrix.goos }}_${{ matrix.goarch }} .
          fi

      - name: Package binary archive
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp plydb_${{ matrix.goos }}_${{ matrix.goarch }}.exe plydb.exe
            tar czf plydb_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz plydb.exe
            rm plydb.exe
          else
            cp plydb_${{ matrix.goos }}_${{ matrix.goarch }} plydb
            tar czf plydb_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz plydb
            rm plydb
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: assets-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/plydb_*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/assets
          merge-multiple: true

      - name: Package skill
        run: |
          cd skills
          zip -X -r ../dist/assets/plydb_skill.zip plydb

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/assets/*
        env:
          GH_TOKEN: ${{ github.token }}
